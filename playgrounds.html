<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ארנה">
<title>🏟️ Arena | ארנה</title>
<link rel="manifest" href="/manifest-playgrounds.json">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a1628;--card:#141f35;--card2:#1e2d4a;
  --border:#2a3a5c;--border2:#3a4a6c;
  --accent:#30d158;--accent-s:#30d15820;
  --blue:#0a84ff;--red:#ff453a;
  --text:#fff;--text2:rgba(255,255,255,.75);--muted:rgba(255,255,255,.4);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Assistant',sans-serif;background:var(--bg);color:var(--text)}
#map{position:fixed;inset:0;z-index:1}

.hdr{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;
  background:linear-gradient(to bottom,rgba(10,22,40,.95) 50%,transparent);
  pointer-events:none;
}
.hdr-row{display:flex;align-items:center;gap:10px;pointer-events:all}
.hdr-title{font-size:19px;font-weight:900;letter-spacing:-.3px;flex:1}
.hdr-country{font-size:13px;font-weight:700;color:var(--accent);background:var(--accent-s);border:1px solid var(--accent);border-radius:20px;padding:4px 10px;white-space:nowrap}
.hdr-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(20,31,53,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border2);color:var(--text);font-size:19px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s;
}
.hdr-btn:active{transform:scale(.9)}

#status{
  position:fixed;left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(20,31,53,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border2);border-radius:20px;
  padding:8px 18px;font-size:13px;font-weight:600;color:var(--text2);
  white-space:nowrap;transition:opacity .4s;pointer-events:none;
}

#loc-btn{
  position:fixed;left:16px;z-index:100;
  width:46px;height:46px;border-radius:50%;
  background:rgba(20,31,53,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border2);color:var(--accent);font-size:24px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,0,0,.5);transition:.15s;
}
#loc-btn:active{transform:scale(.9)}

.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:200;
  height:46vh;
  background:var(--card);border-radius:22px 22px 0 0;
  border-top:1px solid var(--border);display:flex;flex-direction:column;will-change:transform;
}
.handle-wrap{padding:10px 0 2px;cursor:grab;flex-shrink:0;text-align:center}
.handle{width:40px;height:4px;border-radius:2px;background:var(--border2);display:inline-block}
.sheet-head{padding:4px 16px 12px;flex-shrink:0;border-bottom:1px solid var(--border)}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.fpill{
  flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--border2);background:transparent;
  color:var(--muted);font-family:inherit;transition:.2s;white-space:nowrap;
}
.fpill.on{border-color:var(--accent);background:var(--accent-s);color:var(--accent)}
.sheet-meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.city-row{display:flex;gap:7px;margin-top:10px;position:relative}
.city-inp{
  flex:1;padding:9px 12px;border-radius:11px;
  background:var(--card2);border:1.5px solid var(--border2);
  color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:.2s;
}
.city-inp:focus{border-color:var(--accent)}
.city-inp::placeholder{color:var(--muted)}
.city-btn{
  padding:9px 14px;border-radius:11px;border:none;
  background:var(--accent);color:#000;font-size:15px;font-weight:800;
  font-family:inherit;cursor:pointer;flex-shrink:0;transition:.15s;
}
.city-btn:active{opacity:.8}
/* history button */
.history-btn{
  flex-shrink:0;width:40px;height:40px;border-radius:11px;
  background:var(--card2);border:1.5px solid var(--border2);
  color:var(--muted);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.history-btn:active{background:var(--card);color:var(--text)}
/* history dropdown */
#history-list{
  position:absolute;top:100%;right:0;left:0;z-index:1000;
  background:var(--card);border:1.5px solid var(--border2);border-radius:12px;
  margin-top:4px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none;
}
#history-list.open{display:block}
.hist-head{padding:8px 14px 4px;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.hist-clear{background:none;border:none;font-size:11px;color:var(--red);cursor:pointer;font-family:inherit;font-weight:700;padding:0}
.hist-item{padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;border-top:.5px solid var(--border);display:flex;align-items:center;gap:8px;transition:.12s}
.hist-item:active,.hist-item:hover{background:var(--card2);color:var(--text)}

/* autocomplete dropdown */
#autocomplete-list{
  position:absolute;top:100%;right:0;left:0;z-index:999;
  background:var(--card);border:1.5px solid var(--border2);border-radius:12px;
  margin-top:4px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none;
}
#autocomplete-list.open{display:block}
.ac-item{
  padding:11px 14px;font-size:13px;color:var(--text2);cursor:pointer;
  border-bottom:.5px solid var(--border);transition:.12s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ac-item:last-child{border-bottom:none}
.ac-item:active,.ac-item:hover{background:var(--card2);color:var(--text)}
.count-lbl{font-size:13px;color:var(--muted);font-weight:600}
.radius-sel{background:var(--card2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;font-weight:700;padding:5px 10px;cursor:pointer;outline:none}
.scope-row{display:flex;gap:6px;overflow-x:auto;margin-top:9px;padding-bottom:2px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.scope-row::-webkit-scrollbar{display:none}
.scope-btn{flex-shrink:0;padding:6px 13px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;transition:.2s;white-space:nowrap}
.scope-btn.on{border-color:var(--blue);background:rgba(10,132,255,.15);color:var(--blue)}
.scope-btn:active{opacity:.8}
.scope-sep{width:1px;flex-shrink:0;background:var(--border2);margin:2px 3px}
.sheet-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}

.frow{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:.5px solid var(--border);cursor:pointer;transition:.12s}
.frow:active{background:var(--card2)}
.frow:last-child{border-bottom:none}
.fi{font-size:32px;flex-shrink:0}
.fn{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fs{font-size:12px;color:var(--muted);margin-top:2px}
.fd{font-size:14px;font-weight:800;color:var(--accent);flex-shrink:0}

#overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:none;align-items:flex-end}
#overlay.on{display:flex}
.dcard{width:100%;background:var(--card);border-radius:22px 22px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom,0px) + 20px);border-top:1px solid var(--border2)}
.dhead{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.dico{font-size:52px;line-height:1}
.dname{font-size:21px;font-weight:900;letter-spacing:-.4px;line-height:1.2}
.dsub{font-size:14px;color:var(--muted);margin-top:4px}
.dtags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.dtag{font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;background:var(--card2);color:var(--text2);border:1px solid var(--border)}
.dbtns{display:flex;gap:10px}
.dbtn{flex:1;padding:14px;border-radius:14px;border:none;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;transition:.15s}
.dbtn:active{opacity:.8;transform:scale(.97)}
.dbtn-waze{background:#33ccff;color:#000}
.dbtn-gmap{background:#4285f4;color:#fff}
.dbtn-close{background:var(--card2);color:var(--text2);flex:0.5}
.dbtn-fav{background:rgba(255,204,0,.15);border:1.5px solid #ffcc00;color:#ffcc00;flex:0.5}
.dbtn-fav.saved{background:rgba(255,204,0,.3);color:#ffcc00}

/* ─── FAVORITES PANEL ─── */
#fav-panel{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.75);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:none;align-items:flex-end;
}
#fav-panel.on{display:flex}
.fav-card{
  width:100%;max-height:80vh;background:var(--card);
  border-radius:22px 22px 0 0;border-top:1px solid var(--border2);
  display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.fav-head{padding:16px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.fav-head-title{font-size:18px;font-weight:900;flex:1}
.fav-close{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;padding:0}
.fav-sport-tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 16px;border-bottom:1px solid var(--border);scrollbar-width:none}
.fav-sport-tabs::-webkit-scrollbar{display:none}
.fav-stab{flex-shrink:0;padding:6px 13px;border-radius:16px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;white-space:nowrap;transition:.2s}
.fav-stab.on{border-color:#ffcc00;background:rgba(255,204,0,.15);color:#ffcc00}
.fav-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.fav-item{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:.5px solid var(--border);cursor:pointer;transition:.12s}
.fav-item:active{background:var(--card2)}
.fav-del{background:none;border:none;font-size:20px;color:var(--red);cursor:pointer;padding:4px;flex-shrink:0}

.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:36px 20px;color:var(--muted);font-size:15px}
.empty-ico{font-size:52px;margin-bottom:12px}

/* ─── SPONSORED ─── */
.sp-row{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:.5px solid #3a1a6a;cursor:pointer;transition:.12s;background:rgba(191,90,242,.07);border-right:3px solid #bf5af2}
.sp-row:active{background:rgba(191,90,242,.15)}
.sp-badge{font-size:9px;font-weight:800;color:#bf5af2;background:rgba(191,90,242,.18);border:1px solid rgba(191,90,242,.4);border-radius:4px;padding:2px 6px;display:inline-block;margin-bottom:3px}
.sp-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-desc{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
.sp-dist{font-size:14px;font-weight:800;color:#bf5af2;flex-shrink:0}

/* ─── AD BANNER ─── */
.ad-wrap{padding:8px 14px;border-bottom:.5px solid var(--border);background:rgba(255,255,255,.03)}
.ad-lbl{font-size:9px;color:rgba(255,255,255,.2);font-weight:700;text-align:left;margin-bottom:4px}
.ad-placeholder{background:linear-gradient(135deg,#1e2d4a,#162035);border-radius:10px;height:60px;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,.3);border:1px dashed #2a3a5c}

/* ─── SPONSORED DETAIL ─── */
.dbtn-phone{background:#30d158;color:#000}
.dbtn-web{background:#ff9f0a;color:#000}

/* ─── RATING ─── */
.rating-wrap{margin:12px 0 4px}
.rating-label{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px}
.stars-row{display:flex;gap:6px;margin-bottom:10px}
.star{font-size:28px;cursor:pointer;transition:.15s;opacity:.35;line-height:1}
.star.on{opacity:1}
.rtag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.rtag{padding:6px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;transition:.2s}
.rtag.on{border-color:var(--accent);background:var(--accent-s);color:var(--accent)}
.rating-submit{width:100%;padding:11px;border-radius:11px;border:none;background:var(--accent);color:#000;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;transition:.15s}
.rating-submit:active{opacity:.8}
.saved-rating{font-size:13px;color:var(--accent);font-weight:700;margin-top:4px}
.avg-stars{font-size:13px;color:#ffcc00;font-weight:700}

/* ─── PHOTOS ─── */
.photos-wrap{margin:12px 0 4px}
.photos-label{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.photo-btns{display:flex;gap:8px;margin-bottom:10px}
.photo-btn{flex:1;padding:10px;border-radius:11px;border:1.5px solid var(--border2);background:var(--card2);color:var(--text2);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;text-align:center}
.photo-btn:active{background:var(--card)}
.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:4px}
.photo-thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;border:1.5px solid var(--border)}
.photo-count{font-size:11px;color:var(--muted);font-weight:700}
/* lightbox */
#lightbox{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;flex-direction:column}
#lightbox.on{display:flex}
#lightbox img{max-width:95vw;max-height:82vh;border-radius:14px;object-fit:contain}
#lightbox-close{position:absolute;top:calc(env(safe-area-inset-top,0px)+16px);right:20px;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:26px;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ─── DESKTOP LAYOUT ─── */
@media (min-width: 700px) {
  .sheet{
    top:0;left:auto;right:0;bottom:0;width:380px;height:100%!important;
    border-radius:0;border-top:none;border-right:none;border-left:1px solid var(--border);
  }
  .handle-wrap{display:none}
  #loc-btn{left:auto;right:396px;bottom:24px!important}
  #status{left:auto;right:calc(380px + 50%);transform:translateX(50%)}
  .hdr{right:380px}
}

/* ─── MAP MARKERS ─── */
.map-pin{
  width:42px;height:42px;border-radius:50%;
  background:rgba(10,22,40,.92);
  border:2.5px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  box-shadow:0 4px 16px rgba(0,0,0,.7);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  transition:.15s;
}
.map-pin:active{transform:scale(.9)}

/* ─── CLUSTER ─── */
.cl-wrap{
  width:44px;height:44px;border-radius:50%;
  background:rgba(10,22,40,.95);
  border:3px solid var(--accent);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  box-shadow:0 4px 18px rgba(48,209,88,.35),0 2px 8px rgba(0,0,0,.6);
  font-family:-apple-system,'Assistant',sans-serif;
}
.cl-count{font-size:15px;font-weight:900;color:var(--accent);line-height:1}
.marker-cluster-small,.marker-cluster-medium,.marker-cluster-large{background:transparent!important}
.marker-cluster-small div,.marker-cluster-medium div,.marker-cluster-large div{background:transparent!important}

/* ─── AUTH SCREEN ─── */
#auth-screen{
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 24px calc(env(safe-area-inset-bottom,0px) + 32px);
  transition:opacity .4s;
}
#auth-screen.hide{opacity:0;pointer-events:none}
.auth-logo{font-size:72px;margin-bottom:10px;line-height:1}
.auth-title{font-size:27px;font-weight:900;margin-bottom:6px;letter-spacing:-.4px}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:30px;text-align:center;line-height:1.5}
.auth-form{width:100%;max-width:340px}
.auth-tabs{display:flex;border:1.5px solid var(--border2);border-radius:13px;overflow:hidden;margin-bottom:16px}
.auth-tab{flex:1;padding:11px;background:transparent;border:none;font-family:inherit;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;transition:.2s}
.auth-tab.on{background:var(--accent);color:#000}
.auth-inp{
  width:100%;padding:14px 16px;border-radius:13px;
  background:var(--card2);border:1.5px solid var(--border2);
  color:var(--text);font-family:inherit;font-size:16px;
  margin-bottom:11px;outline:none;transition:.2s;display:block;
}
.auth-inp:focus{border-color:var(--accent)}
.auth-btn{
  width:100%;padding:15px;border-radius:13px;
  background:var(--accent);color:#000;border:none;
  font-family:inherit;font-size:16px;font-weight:800;
  cursor:pointer;margin-bottom:13px;transition:.15s;
}
.auth-btn:active{opacity:.85;transform:scale(.98)}
.auth-div{text-align:center;color:var(--muted);font-size:13px;margin-bottom:13px}
.auth-guest{
  width:100%;padding:14px;border-radius:13px;
  background:transparent;border:1.5px solid var(--border2);
  color:var(--text2);font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;transition:.15s;
}
.auth-guest:active{background:var(--card2)}
.auth-err{color:var(--red);font-size:13px;margin-bottom:9px;text-align:center;min-height:18px}
/* social login */
.auth-social{display:flex;flex-direction:column;gap:9px;margin-bottom:13px}
.auth-social-btn{
  width:100%;padding:14px;border-radius:13px;border:1.5px solid var(--border2);
  background:var(--card2);color:var(--text);font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:10px;
}
.auth-social-btn:active{opacity:.8;transform:scale(.98)}
.auth-google{border-color:#4285f4;background:rgba(66,133,244,.1)}
.auth-apple{border-color:#fff;background:rgba(255,255,255,.08)}
</style>
</head>
<body>

<!-- ─── AUTH SCREEN ─── -->
<div id="auth-screen">
  <div class="auth-logo">🏟️</div>
  <div class="auth-title">Arena · ארנה</div>
  <div class="auth-sub">גלה מגרשי ספורט קרובים אליך<br>בכל מקום בעולם</div>
  <div class="auth-form">
    <div class="auth-tabs">
      <button class="auth-tab on" id="tab-reg" onclick="switchTab('register')">הרשמה</button>
      <button class="auth-tab"    id="tab-log" onclick="switchTab('login')">כניסה</button>
    </div>
    <div class="auth-err" id="auth-err"></div>
    <input class="auth-inp" id="auth-name"  type="text"     placeholder="שם מלא"            autocomplete="name" />
    <input class="auth-inp" id="auth-email" type="email"    placeholder="אימייל"             autocomplete="email"        dir="ltr" />
    <input class="auth-inp" id="auth-pass"  type="password" placeholder="סיסמה (לפחות 6 תווים)" autocomplete="new-password" dir="ltr" />
    <button class="auth-btn" id="auth-submit" onclick="authSubmit()">הרשמה</button>

<script>
// ─── SOCIAL AUTH CONFIG ──────────────────────────────────
// כדי להפעיל: החלף את ה-IDs האמיתיים שלך מ-console.developers.google.com ו-developer.apple.com
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
const APPLE_CLIENT_ID  = 'YOUR_APPLE_SERVICE_ID'; // e.g. com.yourapp.service

function signInWithGoogle() {
  if (GOOGLE_CLIENT_ID.startsWith('YOUR_')) {
    showAuthErr('⚙️ יש להגדיר GOOGLE_CLIENT_ID בקוד');
    return;
  }
  if (!window.google?.accounts) {
    // טען את ה-SDK בזמן ריצה
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => _googleSignIn();
    document.head.appendChild(s);
    return;
  }
  _googleSignIn();
}

function _googleSignIn() {
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: resp => {
      try {
        // decode JWT payload
        const payload = JSON.parse(atob(resp.credential.split('.')[1]));
        currentUser = { email: payload.email, name: payload.name, avatar: payload.picture };
        localStorage.setItem('pg_user', JSON.stringify(currentUser));
        enterApp();
      } catch { showAuthErr('❌ שגיאה בכניסה עם Google'); }
    },
  });
  google.accounts.id.prompt(notification => {
    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
      // fallback — popup
      google.accounts.id.renderButton(
        document.createElement('div'),
        { theme:'filled_black', size:'large', width:340 }
      );
    }
  });
}

function signInWithApple() {
  if (APPLE_CLIENT_ID.startsWith('YOUR_')) {
    showAuthErr('⚙️ יש להגדיר APPLE_CLIENT_ID בקוד');
    return;
  }
  if (!window.AppleID) {
    const s = document.createElement('script');
    s.src = 'https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js';
    s.onload = () => _appleSignIn();
    document.head.appendChild(s);
    return;
  }
  _appleSignIn();
}

async function _appleSignIn() {
  AppleID.auth.init({
    clientId: APPLE_CLIENT_ID,
    scope: 'name email',
    redirectURI: location.origin + '/playgrounds.html',
    usePopup: true,
  });
  try {
    const data = await AppleID.auth.signIn();
    const email = data.authorization?.id_token
      ? JSON.parse(atob(data.authorization.id_token.split('.')[1])).email
      : 'apple-user@privaterelay.appleid.com';
    const name = data.user ? `${data.user.name?.firstName || ''} ${data.user.name?.lastName || ''}`.trim() : 'Apple User';
    currentUser = { email, name: name || email };
    localStorage.setItem('pg_user', JSON.stringify(currentUser));
    enterApp();
  } catch { showAuthErr('❌ שגיאה בכניסה עם Apple'); }
}

// ─── AUTH (local-storage, no backend needed) ────────────
let authMode = 'register', currentUser = null;

function switchTab(mode) {
  authMode = mode;
  const nameEl = document.getElementById('auth-name');
  nameEl.style.display = mode === 'register' ? 'block' : 'none';
  document.getElementById('tab-reg').classList.toggle('on', mode === 'register');
  document.getElementById('tab-log').classList.toggle('on', mode === 'login');
  document.getElementById('auth-submit').textContent = mode === 'register' ? 'הרשמה' : 'כניסה';
  document.getElementById('auth-err').textContent = '';
}

function showAuthErr(msg) { document.getElementById('auth-err').textContent = msg; }

function authSubmit() {
  const name  = document.getElementById('auth-name').value.trim();
  const email = document.getElementById('auth-email').value.trim().toLowerCase();
  const pass  = document.getElementById('auth-pass').value;
  if (!email.includes('@')) return showAuthErr('⚠️ אימייל לא תקין');
  if (pass.length < 6)      return showAuthErr('⚠️ סיסמה: לפחות 6 תווים');

  const users = JSON.parse(localStorage.getItem('pg_users') || '{}');
  if (authMode === 'register') {
    if (users[email]) return showAuthErr('⚠️ אימייל כבר רשום — נסה להיכנס');
    users[email] = { name: name || email.split('@')[0], pass };
    localStorage.setItem('pg_users', JSON.stringify(users));
    currentUser = { email, name: users[email].name };
  } else {
    if (!users[email])              return showAuthErr('⚠️ אימייל לא נמצא');
    if (users[email].pass !== pass) return showAuthErr('⚠️ סיסמה שגויה');
    currentUser = { email, name: users[email].name };
  }
  localStorage.setItem('pg_user', JSON.stringify(currentUser));
  enterApp();
}

function continueAsGuest() {
  currentUser = { guest: true };
  enterApp();
}

function enterApp() {
  const s = document.getElementById('auth-screen');
  s.classList.add('hide');
  setTimeout(() => {
    s.style.display = 'none';
    map.invalidateSize(); // חשוב — מאלץ Leaflet לחשב מחדש את גודל המפה
  }, 420);
  document.getElementById('user-btn').style.display = 'flex';
  updateFilterPills('default');
  updateLocBtn();
  locateMe();
}

function showUserMenu() {
  if (!currentUser) return;
  const info = currentUser.guest
    ? 'אתה גולש כאורח'
    : `${currentUser.name}\n${currentUser.email}`;
  if (confirm(`${info}\n\nהתנתק?`)) {
    localStorage.removeItem('pg_user');
    location.reload();
  }
}

const COUNTRY_NAMES = {
  IL:'🇮🇱 ישראל', US:'🇺🇸 ארה"ב', GB:'🇬🇧 בריטניה', AU:'🇦🇺 אוסטרליה',
  DE:'🇩🇪 גרמניה', FR:'🇫🇷 צרפת', ES:'🇪🇸 ספרד', IT:'🇮🇹 איטליה',
  CA:'🇨🇦 קנדה', NL:'🇳🇱 הולנד', JP:'🇯🇵 יפן', IN:'🇮🇳 הודו',
  BR:'🇧🇷 ברזיל', AR:'🇦🇷 ארגנטינה', RU:'🇷🇺 רוסיה',
};

const ico = s => ICONS[(s||'').toLowerCase()] || ICONS.default;
const he  = s => HE[(s||'').toLowerCase()]   || s || 'מגרש רב-ספורטיבי';
const km  = (lat1,lon1,lat2,lon2) => {
  const R=6371000, dL=(lat2-lat1)*Math.PI/180, dG=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
};
const fmt = d => d < 1000 ? Math.round(d)+'מ\'' : (d/1000).toFixed(1)+'ק"מ';

};

function isNight() {
  const h = new Date().getHours();
  return h < 6 || h >= 21;
}

function applyMapTheme(forceDark) {
  const useDark = forceDark !== undefined ? forceDark : isNight();
  if (tileLayer) map.removeLayer(tileLayer);
  tileLayer = useDark ? TILES.dark : TILES.light;
  tileLayer.addTo(map);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = useDark ? '☀️' : '🌙';
}

function toggleDarkMode() {
  if (darkMode === null) darkMode = !isNight();
  else darkMode = !darkMode;
  applyMapTheme(darkMode);
}

// ─── SHEET DRAG ─────────────────────────────────────────
const sheetEl  = document.getElementById('sheet');
const handleEl = document.getElementById('handle-wrap');
let dStart = null, dH0 = null;

function updateLocBtn() {
  const h = sheetEl.getBoundingClientRect().height;
  document.getElementById('loc-btn').style.bottom = (h + 14) + 'px';
}

handleEl.addEventListener('touchstart', e => {
  dStart = e.touches[0].clientY; dH0 = sheetEl.getBoundingClientRect().height;
}, { passive:true });
handleEl.addEventListener('touchmove', e => {
  const newH = Math.max(170, Math.min(window.innerHeight*.88, dH0 + dStart - e.touches[0].clientY));
  sheetEl.style.height = newH + 'px'; updateLocBtn();
}, { passive:true });
handleEl.addEventListener('touchend', () => { dStart = null; updateLocBtn(); });
handleEl.addEventListener('mousedown', e => {
  dStart = e.clientY; dH0 = sheetEl.getBoundingClientRect().height;
  let dragging = false;
  const move = ev => {
    dragging = true;
    const newH = Math.max(200, Math.min(window.innerHeight * .65, dH0 + dStart - ev.clientY));
    sheetEl.style.height = newH + 'px'; updateLocBtn();
  };
  const up = () => {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', up);
  };
  document.addEventListener('mousemove', move);
  document.addEventListener('mouseup', up);
});

// ─── COUNTRY DETECTION ──────────────────────────────────
async function getCountry(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=3`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const data = await res.json();
    return (data.address?.country_code || 'default').toUpperCase();
  } catch { return 'default'; }
}

function updateFilterPills(countryCode) {
  curFilter = 'all';
  const row = document.getElementById('filter-row');
  row.innerHTML = ALL_FILTERS
    .filter(f => f.countries === 'all' || f.countries.includes(countryCode))
    .map((f, i) => `<button class="fpill${i===0?' on':''}" onclick="setFilter(this,'${f.id}')">${f.label}</button>`)
    .join('');

  const badge = document.getElementById('country-badge');
  if (COUNTRY_NAMES[countryCode]) {
    badge.textContent = COUNTRY_NAMES[countryCode];
    badge.style.display = 'block';
  } else {
    badge.style.display = 'none';
  }
}

// ─── LOCATE ─────────────────────────────────────────────
function locateMe() {
  setStatus('📍 מאתר מיקום...');
  if (!navigator.geolocation) { setStatus('⚠️ GPS לא נתמך בדפדפן זה'); return; }
  navigator.geolocation.getCurrentPosition(
    p => onLocation(p.coords.latitude, p.coords.longitude),
    () => setStatus('⚠️ לא ניתן לאתר מיקום — בדוק הרשאות GPS')
  );
}

async function onLocation(lat, lon) {
  uLat = lat; uLon = lon;
  map.setView([lat, lon], 15);
  if (uMarker) map.removeLayer(uMarker);
  uMarker = L.circleMarker([lat, lon], {
    radius:11, fillColor:'#30d158', fillOpacity:1, color:'#fff', weight:3, zIndexOffset:9999
  }).addTo(map).bindPopup('<div dir="rtl" style="font-weight:700;font-family:Assistant,sans-serif">📍 המיקום שלך</div>');

  setStatus('🌍 מזהה מדינה...');
  curCountry = await getCountry(lat, lon);
  updateFilterPills(curCountry);
  loadFields(lat, lon);
}

// ─── OVERPASS ───────────────────────────────────────────
async function loadFields(lat, lon) {
  document.getElementById('list').innerHTML = '<div class="empty"><span class="spinner"></span></div>';
  document.getElementById('cnt').textContent = 'טוען...';

  const leisureTypes = 'pitch|sports_centre|playground|fitness_station|swimming_pool|track|skate_park|golf_course|ice_rink|climbing|stadium|horse_riding|bowling_alley|miniature_golf|sports_hall';
  let q, timeout = 45;

  if (searchScope === 'city' || searchScope === 'country' || searchScope === 'world') {
    const level = searchScope === 'world' ? 'world' : searchScope;
    const labels = { city:'🏙️ כל העיר', country:'🌍 כל המדינה', world:'🌐 כל העולם' };
    setStatus(`${labels[searchScope]} — טוען...`);

    let bbox;
    if (searchScope === 'world') {
      bbox = [-90, -180, 90, 180]; // כל העולם — מוגבל לתוצאות הראשונות
      timeout = 30;
    } else {
      bbox = await fetchBbox(searchScope);
      if (!bbox) { setStatus('❌ שגיאה בזיהוי גבולות'); return; }
      timeout = searchScope === 'country' ? 90 : 45;
    }
    const [S, W, N, E] = bbox;
    const bboxStr = `${S},${W},${N},${E}`;
    q = `[out:json][timeout:${timeout}][bbox:${bboxStr}];(
way["leisure"~"^(${leisureTypes})$"];
relation["leisure"~"^(pitch|sports_centre|swimming_pool|track|golf_course|stadium|horse_riding)$"];
way["sport"~"."];
);out 300 center tags;`;
  } else {
    // radius mode
    setStatus(`🔍 מחפש ב-${fmt(curRadius)}...`);
    q = `[out:json][timeout:45];(
node["leisure"~"^(${leisureTypes})$"](around:${curRadius},${lat},${lon});
way["leisure"~"^(${leisureTypes})$"](around:${curRadius},${lat},${lon});
relation["leisure"~"^(pitch|sports_centre|swimming_pool|track|golf_course|stadium|horse_riding)$"](around:${curRadius},${lat},${lon});
way["sport"~"."](around:${curRadius},${lat},${lon});
node["sport"~"^(soccer|basketball|tennis|volleyball|handball|padel|cricket|rugby|baseball|american_football|hockey|field_hockey|lacrosse|golf|swimming|athletics|climbing|boxing|martial_arts|skateboard|table_tennis|badminton|pickleball|equestrian|surfing|rowing|sailing|bowling|petanque|archery|parkour|crossfit|shooting|yoga)$"](around:${curRadius},${lat},${lon});
node["amenity"="gym"](around:${curRadius},${lat},${lon});
);out center tags;`;
  }

  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', {
      method:'POST', body:'data='+encodeURIComponent(q)
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    const leisureMap = {
      playground:'playground', fitness_station:'fitness',
      swimming_pool:'swimming', track:'athletics',
      skate_park:'skateboard', golf_course:'golf',
      ice_rink:'hockey', climbing:'climbing',
      horse_riding:'equestrian', bowling_alley:'bowling',
      miniature_golf:'miniature_golf', sports_hall:'fitness',
      stadium:'multi',
    };

    allFields = (data.elements||[]).map(el => {
      const clat = el.lat || el.center?.lat;
      const clon = el.lon || el.center?.lon;
      if (!clat || !clon) return null;
      const t = el.tags || {};
      const sports = (t.sport||'').split(';').map(s=>s.trim().toLowerCase()).filter(Boolean);
      const primarySport = sports[0] || leisureMap[t.leisure] || 'default';
      if (!sports.length) sports.push(primarySport);
      const name = t.name || t['name:he'] || he(primarySport);
      return { lat:clat, lon:clon, name, sport:primarySport, sports, tags:t, dist:km(lat,lon,clat,clon) };
    }).filter(Boolean).sort((a,b) => a.dist - b.dist);

    renderMarkers(); renderList();
    // אם לא נמצא כלום ב-radius — הגדל אוטומטית
    if (allFields.length === 0 && searchScope === 'radius' && curRadius < 5000) {
      const next = curRadius <= 1000 ? 2000 : 5000;
      setRadius(next);
      setStatus('🔍 מרחיב חיפוש...');
      setTimeout(() => loadFields(lat, lon), 600);
      return;
    }
    setStatus(`נמצאו ${getFiltered().length} מגרשים`, true);
  } catch(e) {
    setStatus('❌ שגיאה בטעינה — נסה שוב');
    document.getElementById('list').innerHTML = '<div class="empty"><div class="empty-ico">😕</div>שגיאה בטעינת נתונים<br><small>בדוק חיבור לאינטרנט</small></div>';
    document.getElementById('cnt').textContent = 'שגיאה';
  }
}

// ─── FILTER ─────────────────────────────────────────────
function getFiltered() {
  if (curFilter === 'all') return allFields;
  const group = FILTER_GROUPS[curFilter] || [curFilter];
  return allFields.filter(f => f.sports.some(s => group.includes(s)));
}

function setFilter(btn, filter) {
  curFilter = filter;
  document.querySelectorAll('.fpill').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  renderMarkers(); renderList();
  setStatus(`${getFiltered().length} מגרשים`, true);
}


// ─── MARKERS ────────────────────────────────────────────
function renderMarkers() {
  if (markerCluster) { markerCluster.clearLayers(); }
  else {
    markerCluster = L.markerClusterGroup({
      maxClusterRadius: 55,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
      zoomToBoundsOnClick: true,
      iconCreateFunction: c => L.divIcon({
        html: `<div class="cl-wrap"><span class="cl-count">${c.getChildCount()}</span></div>`,
        className: '', iconSize: [44,44], iconAnchor: [22,22]
      })
    });
    map.addLayer(markerCluster);
  }
  getFiltered().forEach((f, i) => {
    const badge = f.sports.length > 1
      ? `<span style="position:absolute;top:-4px;left:-4px;background:var(--accent);color:#000;border-radius:50%;width:17px;height:17px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;border:1.5px solid #0a1628">${f.sports.length}</span>`
      : '';
    const icon = L.divIcon({
      html: `<div class="map-pin" style="position:relative">${ico(f.sport)}${badge}</div>`,
      className: '', iconSize: [42,42], iconAnchor: [21,21]
    });
    const m = L.marker([f.lat, f.lon], { icon });
    m.on('click', () => openDetail(i));
    markerCluster.addLayer(m);
  });
}

// ─── SPONSORED HELPERS ──────────────────────────────────
let shownSponsored = [];

function getNearbySponsored() {
  if (!uLat) return [];
  return SPONSORED.filter(s => {
    const countryOk = s.countries === 'all' || s.countries.includes(curCountry);
    const distOk = km(uLat, uLon, s.lat, s.lon) <= MAX_SPONSORED_DIST;
    const filterOk = curFilter === 'all' || (FILTER_GROUPS[curFilter]||[curFilter]).includes(s.sport);
    return countryOk && distOk && filterOk;
  }).map(s => ({ ...s, dist: km(uLat, uLon, s.lat, s.lon) }))
    .sort((a, b) => a.dist - b.dist);
}

function openSponsored(i) {
  const s = shownSponsored[i]; if (!s) return;
  selected = { lat: s.lat, lon: s.lon, _sponsored: s };
  map.flyTo([s.lat, s.lon], 17, { duration: 0.6 });
  document.getElementById('d-ico').textContent  = s.icon;
  document.getElementById('d-name').textContent = s.name;
  document.getElementById('d-sub').textContent  = `${s.desc} · ${fmt(s.dist)} ממיקומך`;
  document.getElementById('d-tags').innerHTML =
    `<span class="dtag">⭐ ממומן</span><span class="dtag">📞 ${s.phone}</span>`;

    <button class="dbtn dbtn-waze"  onclick="navTo('waze')">🔵 Waze</button>

  document.getElementById('overlay').classList.add('on');
}

// ─── LIST ────────────────────────────────────────────────
function renderList() {
  shownFields = getFiltered();
  shownSponsored = getNearbySponsored();
  const el = document.getElementById('list');
  document.getElementById('cnt').textContent = `${shownFields.length} מגרשים`;

  if (!shownFields.length && !shownSponsored.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">🔍</div>לא נמצאו מגרשים<br><small>נסה להגדיל את הרדיוס</small><br><br><button onclick="locateMe()" style="margin-top:8px;padding:12px 24px;border-radius:12px;background:var(--accent);color:#000;border:none;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer">📍 אתר מיקומי מחדש</button></div>';
    updateLocBtn(); return;
  }

  // רשומות ממומנות בראש הרשימה
  const sponsoredRows = shownSponsored.map((s, i) => `
    <div class="sp-row" onclick="openSponsored(${i})">
      <div style="font-size:32px;flex-shrink:0">${s.icon}</div>
      <div style="flex:1;min-width:0">
        <div class="sp-badge">⭐ ממומן</div>
        <div class="sp-name">${s.name}</div>
        <div class="sp-desc">${s.desc}</div>
      </div>
      <div class="sp-dist">${fmt(s.dist)}</div>
    </div>`).join('');

  const rows = shownFields.slice(0, 50).map((f, i) => {
    const extras = [
      f.tags?.surface ? `🌱 ${f.tags.surface}` : '',
      f.tags?.lit === 'yes' ? '💡' : '',
      f.tags?.access === 'private' ? '🔒' : ''
    ].filter(Boolean).join(' ');
    const sportIcons = f.sports.length > 1
      ? f.sports.slice(0,4).map(s=>ico(s)).join('')
      : ico(f.sport);
    const sportLabel = f.sports.length > 1
      ? f.sports.slice(0,3).map(s=>he(s)).join(' · ')
      : he(f.sport);
    return `<div class="frow" onclick="openDetail(${i})">
      <div class="fi" style="font-size:${f.sports.length>1?'20px':'32px'};line-height:1.4">${sportIcons}</div>
      <div style="flex:1;min-width:0">
        <div class="fn">${f.name}</div>
        <div class="fs">${sportLabel}${extras?' · '+extras:''}</div>
      </div>
      <div class="fd">${fmt(f.dist)}</div>
    </div>`;
  }).join('');

  const more = shownFields.length > 50
    ? `<div style="text-align:center;padding:16px;font-size:13px;color:var(--muted)">ועוד ${shownFields.length-50} — הקטן את הרדיוס</div>`
    : '<div style="padding-bottom:env(safe-area-inset-bottom,16px)"></div>';

  el.innerHTML = sponsoredRows + rows + more;
  updateLocBtn();
}

// ─── PHOTOS ─────────────────────────────────────────────
function photoKey(f) { return `pg_photos_${f.lat}_${f.lon}`; }

function getFieldPhotos(f) {
  return JSON.parse(localStorage.getItem(photoKey(f)) || '[]');
}

function addFieldPhoto(f, dataUrl) {
  const photos = getFieldPhotos(f);
  photos.unshift(dataUrl);
  // שמור עד 6 תמונות לכל מגרש
  localStorage.setItem(photoKey(f), JSON.stringify(photos.slice(0, 6)));
}

function buildPhotosBlock(f) {
  const photos = getFieldPhotos(f);
  const gridHtml = photos.length
    ? `<div class="photos-grid">${photos.map((p,i)=>`<img class="photo-thumb" src="${p}" onclick="openLightbox(${i})" alt="">`).join('')}</div>
       <div class="photo-count">${photos.length} תמונות</div>`
    : '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">אין תמונות עדיין — היה הראשון!</div>';
  return `<div class="photos-wrap">
    <div class="photos-label">📸 תמונות מהמגרש</div>
    ${gridHtml}
    <div class="photo-btns">
      <button class="photo-btn" onclick="pickPhoto('camera')">📷 צלם</button>
      <button class="photo-btn" onclick="pickPhoto('gallery')">🖼️ גלריה</button>
    </div>
  </div>`;
}

function pickPhoto(source) {
  if (!selected) return;
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  if (source === 'camera') inp.capture = 'environment';
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      addFieldPhoto(selected, ev.target.result);
      // רענן את בלוק התמונות
      const wrap = document.querySelector('.photos-wrap');
      if (wrap) wrap.outerHTML = buildPhotosBlock(selected);
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

let lightboxPhotos = [];
function openLightbox(i) {
  if (!selected) return;
  lightboxPhotos = getFieldPhotos(selected);
  document.getElementById('lightbox-img').src = lightboxPhotos[i] || '';
  document.getElementById('lightbox').classList.add('on');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('on');
}

// ─── RATINGS ────────────────────────────────────────────
const RATING_TAGS = ['מצב טוב','תאורה','שמישה','ניקיון','נגישות','חינמי','צל','חניה'];

function ratingKey(f) { return `pg_rating_${f.lat}_${f.lon}`; }
function getRatings()  { return JSON.parse(localStorage.getItem('pg_ratings') || '{}'); }

function getFieldRating(f) {
  const all = getRatings();
  return all[ratingKey(f)] || null;
}

function getFieldAvg(f) {
  const all = JSON.parse(localStorage.getItem('pg_all_ratings') || '{}');
  const key = ratingKey(f);
  return all[key] || null; // { avg, count }
}

function saveRating(f, stars, tags) {
  // שמור דירוג של המשתמש הנוכחי
  const all = getRatings();
  all[ratingKey(f)] = { stars, tags };
  localStorage.setItem('pg_ratings', JSON.stringify(all));

  // עדכן ממוצע (מדמה שמירה מקומית של כל הדירוגים)
  const avg = JSON.parse(localStorage.getItem('pg_all_ratings') || '{}');
  const key = ratingKey(f);
  if (!avg[key]) avg[key] = { sum: 0, count: 0 };
  avg[key].sum   += stars;
  avg[key].count += 1;
  avg[key].avg    = (avg[key].sum / avg[key].count).toFixed(1);
  localStorage.setItem('pg_all_ratings', JSON.stringify(avg));
}

let curStars = 0, curRatingTags = new Set();

function buildRatingBlock(f) {
  const saved = getFieldRating(f);
  const avgData = getFieldAvg(f);
  const avgStr = avgData ? `${avgData.avg}⭐ (${avgData.count} דירוגים)` : '';

  if (saved) {
    const tagStr = saved.tags.length ? saved.tags.join(' · ') : '';
    return `<div class="rating-wrap">
      <div class="saved-rating">הדירוג שלך: ${'★'.repeat(saved.stars)}${'☆'.repeat(5-saved.stars)} ${tagStr ? '· ' + tagStr : ''}</div>
      ${avgStr ? `<div class="avg-stars">${avgStr}</div>` : ''}
    </div>`;
  }

  curStars = 0; curRatingTags = new Set();
  const tagsHtml = RATING_TAGS.map(t =>
    `<button class="rtag" onclick="toggleRTag(this,'${t}')">${t}</button>`
  ).join('');
  return `<div class="rating-wrap">
    <div class="rating-label">דרג את המגרש${avgStr ? ' · ' + avgStr : ''}</div>
    <div class="stars-row" id="stars-row">
      ${[1,2,3,4,5].map(n=>`<span class="star" data-n="${n}" onclick="setStars(${n})">★</span>`).join('')}
    </div>
    <div class="rtag-row">${tagsHtml}</div>
    <button class="rating-submit" onclick="submitRating()">שמור דירוג</button>
  </div>`;
}

function setStars(n) {
  curStars = n;
  document.querySelectorAll('#stars-row .star').forEach(s => {
    s.classList.toggle('on', parseInt(s.dataset.n) <= n);
  });
}

function toggleRTag(btn, tag) {
  if (curRatingTags.has(tag)) { curRatingTags.delete(tag); btn.classList.remove('on'); }
  else                        { curRatingTags.add(tag);    btn.classList.add('on'); }
}

function submitRating() {
  if (!curStars || !selected) return;
  saveRating(selected, curStars, [...curRatingTags]);
  // רענן חלון פרטים
  const ratingEl = document.querySelector('.rating-wrap');
  if (ratingEl) {
    const saved = getFieldRating(selected);
    const tagStr = saved.tags.length ? saved.tags.join(' · ') : '';
    ratingEl.innerHTML = `<div class="saved-rating">הדירוג שלך: ${'★'.repeat(saved.stars)}${'☆'.repeat(5-saved.stars)} ${tagStr ? '· ' + tagStr : ''}</div>`;
  }
}

// ─── FAVORITES ──────────────────────────────────────────
function getFavs() { return JSON.parse(localStorage.getItem('pg_favs') || '{}'); }
function saveFavs(f) { localStorage.setItem('pg_favs', JSON.stringify(f)); }

function isFav(field) {
  const favs = getFavs();
  const sport = field.sport || 'default';
  return !!(favs[sport] || []).find(f => f.lat === field.lat && f.lon === field.lon);
}

function toggleFav(field) {
  const favs = getFavs();
  const sport = field.sport || 'default';
  if (!favs[sport]) favs[sport] = [];
  const idx = favs[sport].findIndex(f => f.lat === field.lat && f.lon === field.lon);
  if (idx >= 0) {
    favs[sport].splice(idx, 1);
    if (!favs[sport].length) delete favs[sport];
  } else {
    favs[sport].push({ lat: field.lat, lon: field.lon, name: field.name, sport, dist: field.dist });
  }
  saveFavs(favs);
  return isFav(field);
}

let curFavSport = 'all';

function openFavPanel() {
  curFavSport = 'all';
  renderFavPanel();
  document.getElementById('fav-panel').classList.add('on');
}

function closeFavPanel() {
  document.getElementById('fav-panel').classList.remove('on');
}

function renderFavPanel() {
  const favs = getFavs();
  const sports = Object.keys(favs);
  const tabsEl = document.getElementById('fav-sport-tabs');
  const bodyEl = document.getElementById('fav-body');

  // tabs
  const allCount = sports.reduce((s, k) => s + favs[k].length, 0);
  tabsEl.innerHTML = [
    `<button class="fav-stab${curFavSport==='all'?' on':''}" onclick="setFavSport('all')">🏟️ הכל (${allCount})</button>`,
    ...sports.map(s => `<button class="fav-stab${curFavSport===s?' on':''}" onclick="setFavSport('${s}')">${ico(s)} ${he(s)} (${favs[s].length})</button>`)
  ].join('');

  // items
  const items = curFavSport === 'all'
    ? sports.flatMap(s => favs[s].map(f => ({ ...f, sport: s })))
    : (favs[curFavSport] || []);

  if (!items.length) {
    bodyEl.innerHTML = '<div class="empty"><div class="empty-ico">⭐</div>אין מועדפים עדיין<br><small>לחץ ⭐ בחלון פרטי המגרש</small></div>';
    return;
  }
  bodyEl.innerHTML = items.map((f, i) => `
    <div class="fav-item" onclick="closeFavPanel();goToLatLon(${f.lat},${f.lon})">
      <div style="font-size:28px">${ico(f.sport)}</div>
      <div style="flex:1;min-width:0">
        <div class="fn">${f.name}</div>
        <div class="fs">${he(f.sport)}${f.dist ? ' · ' + fmt(f.dist) : ''}</div>
      </div>
      <button class="fav-del" onclick="event.stopPropagation();removeFav('${f.sport}',${f.lat},${f.lon})" title="הסר">🗑️</button>
    </div>`).join('');
}

function setFavSport(sport) {
  curFavSport = sport;
  renderFavPanel();
}

function removeFav(sport, lat, lon) {
  const favs = getFavs();
  if (!favs[sport]) return;
  favs[sport] = favs[sport].filter(f => f.lat !== lat || f.lon !== lon);
  if (!favs[sport].length) delete favs[sport];
  saveFavs(favs);
  renderFavPanel();
}

function openDetail(i) {
  const f = shownFields[i]; if (!f) return;
  selected = f;
  map.flyTo([f.lat, f.lon], 17, { duration:0.6 });
  document.getElementById('d-ico').textContent  = ico(f.sport);
  document.getElementById('d-name').textContent = f.name;
  document.getElementById('d-sub').textContent  = `${fmt(f.dist)} ממיקומך`;
  const tags = [];
  f.sports.filter(s=>s!=='default').forEach(s => tags.push(`${ico(s)} ${he(s)}`));
  if (!f.sports.filter(s=>s!=='default').length) tags.push(`${ico(f.sport)} ${he(f.sport)}`);
  if (f.tags?.surface)              tags.push(`🌱 ${f.tags.surface}`);
  if (f.tags?.lit === 'yes')        tags.push('💡 תאורה לילית');
  if (f.tags?.fee === 'no')         tags.push('🆓 כניסה חינם');
  if (f.tags?.fee === 'yes')        tags.push('💰 בתשלום');
  if (f.tags?.access === 'private') tags.push('🔒 פרטי');
  else                              tags.push('✅ פתוח לציבור');
  if (f.tags?.opening_hours)        tags.push(`🕐 ${f.tags.opening_hours}`);
  if (f.tags?.capacity)             tags.push(`👥 ${f.tags.capacity}`);
  if (f.tags?.phone)                tags.push(`📞 ${f.tags.phone}`);
  if (f.tags?.website)              tags.push(`🌐 אתר`);
  document.getElementById('d-tags').innerHTML = tags.map(t => `<span class="dtag">${t}</span>`).join('')
    + buildPhotosBlock(f)
    + buildRatingBlock(f);
  const favSaved = isFav(f);
  document.getElementById('d-btns').innerHTML = `
    <button class="dbtn dbtn-waze" onclick="navTo('waze')">🔵 Waze</button>
    <button class="dbtn dbtn-gmap" onclick="navTo('gmap')">🗺️ מפות</button>
    <button class="dbtn dbtn-fav${favSaved?' saved':''}" id="fav-btn" onclick="onFavClick()">${favSaved?'★':'☆'}</button>
    <button class="dbtn dbtn-close" onclick="closeDetail()">סגור</button>
  `;
  document.getElementById('overlay').classList.add('on');
}

function onFavClick() {
  if (!selected || selected._sponsored) return;
  const saved = toggleFav(selected);
  const btn = document.getElementById('fav-btn');
  btn.textContent = saved ? '★' : '☆';
  btn.classList.toggle('saved', saved);
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('on'); selected = null;
}

function navTo(app) {
  if (!selected) return;
  const { lat, lon } = selected;
  if (app==='waze') window.open(`https://waze.com/ul?ll=${lat},${lon}&navigate=yes`);
  else              window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

// ─── SCOPE (radius / city / country / world) ────────────
let searchScope = 'radius';
let curRadius   = 500;
let bboxCache   = {};

function setRadius(r) {
  curRadius = r; searchScope = 'radius';
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('on'));
  document.querySelector(`.scope-btn[data-r="${r}"]`)?.classList.add('on');
  if (uLat != null) loadFields(uLat, uLon);
}

async function setScope(mode) {
  searchScope = mode;
  document.querySelectorAll('.scope-btn').forEach(b => b.classList.remove('on'));
  document.querySelector(`.scope-btn[data-s="${mode}"]`)?.classList.add('on');
  if (!uLat) { locateMe(); return; }
  loadFields(uLat, uLon);
}

async function fetchBbox(level) {
  if (bboxCache[level]) return bboxCache[level];
  const zoom = level === 'city' ? 10 : 3;
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${uLat}&lon=${uLon}&format=json&zoom=${zoom}`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const d = await res.json();
    const bb = d.boundingbox; // [S, N, W, E]
    bboxCache[level] = [parseFloat(bb[0]), parseFloat(bb[2]), parseFloat(bb[1]), parseFloat(bb[3])];
    return bboxCache[level];
  } catch { return null; }
}

// ─── CITY SEARCH + AUTOCOMPLETE ─────────────────────────
let acTimer = null;
let acResults = [];

async function onSearchInput(val) {
  clearTimeout(acTimer);
  if (val.trim().length < 2) { closeAutocomplete(); return; }
  acTimer = setTimeout(() => fetchSuggestions(val.trim()), 300);
}

async function fetchSuggestions(q) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`,
      { headers: { 'Accept-Language': 'he,en' } }
    );
    acResults = await res.json();
    const list = document.getElementById('autocomplete-list');
    if (!acResults.length) { closeAutocomplete(); return; }
    list.innerHTML = acResults.map((r, i) => {
      const label = r.display_name.split(',').slice(0,3).join(', ');
      return `<div class="ac-item" onclick="selectSuggestion(${i})">📍 ${label}</div>`;
    }).join('');
    list.classList.add('open');
  } catch { closeAutocomplete(); }
}

function selectSuggestion(i) {
  const r = acResults[i]; if (!r) return;
  const label = r.display_name.split(',').slice(0,3).join(', ');
  document.getElementById('city-inp').value = label;
  closeAutocomplete();
  addToHistory(label, parseFloat(r.lat), parseFloat(r.lon));
  goToLatLon(parseFloat(r.lat), parseFloat(r.lon));
}

function closeAutocomplete() {
  document.getElementById('autocomplete-list').classList.remove('open');
  clearTimeout(acTimer);
}

// ─── SEARCH HISTORY ─────────────────────────────────────
const MAX_HIST = 8;
function getHistory() { return JSON.parse(localStorage.getItem('pg_history') || '[]'); }
function addToHistory(label, lat, lon) {
  let h = getHistory().filter(x => x.label !== label);
  h.unshift({ label, lat, lon });
  if (h.length > MAX_HIST) h = h.slice(0, MAX_HIST);
  localStorage.setItem('pg_history', JSON.stringify(h));
}
function clearHistory() { localStorage.removeItem('pg_history'); renderHistoryList(); }

function renderHistoryList() {
  const h = getHistory();
  const el = document.getElementById('history-list');
  if (!h.length) { el.classList.remove('open'); return; }
  el.innerHTML = `<div class="hist-head">חיפושים אחרונים <button class="hist-clear" onclick="clearHistory()">נקה</button></div>`
    + h.map((x,i) => `<div class="hist-item" onclick="selectHistory(${i})">🕐 ${x.label}</div>`).join('');
  el.classList.add('open');
}

function toggleHistoryList() {
  const el = document.getElementById('history-list');
  if (el.classList.contains('open')) { el.classList.remove('open'); return; }
  closeAutocomplete();
  renderHistoryList();
}

function closeHistoryList() {
  document.getElementById('history-list').classList.remove('open');
}

function selectHistory(i) {
  const h = getHistory()[i]; if (!h) return;
  document.getElementById('city-inp').value = h.label;
  closeHistoryList();
  goToLatLon(h.lat, h.lon);
}

async function goToLatLon(lat, lon) {
  uLat = lat; uLon = lon;
  map.setView([lat, lon], 15);
  if (uMarker) map.removeLayer(uMarker);
  uMarker = L.circleMarker([lat, lon], {
    radius:11, fillColor:'#0a84ff', fillOpacity:1, color:'#fff', weight:3, zIndexOffset:9999
  }).addTo(map);
  curCountry = await getCountry(lat, lon);
  updateFilterPills(curCountry);
  document.getElementById('city-inp').blur();
  loadFields(lat, lon);
}

async function searchCity() {
  const q = document.getElementById('city-inp').value.trim();
  if (!q) return;
  // אם כבר יש תוצאות מה-autocomplete — השתמש בראשונה
  if (acResults.length) { selectSuggestion(0); return; }
  setStatus('🔍 מחפש ' + q + '...');
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,
      { headers: { 'Accept-Language': 'he,en' } }
    );
    const data = await res.json();
    if (!data[0]) { setStatus('❌ לא נמצאה כתובת — נסה שוב'); return; }
    goToLatLon(parseFloat(data[0].lat), parseFloat(data[0].lon));
  } catch(e) { setStatus('❌ שגיאה בחיפוש'); }
}

// סגור autocomplete/history בלחיצה מחוץ
document.addEventListener('click', e => {
  if (!e.target.closest('.city-row')) { closeAutocomplete(); closeHistoryList(); }
});

// ─── OFFLINE DETECTION ──────────────────────────────────
function updateOnlineStatus() {
  const online = navigator.onLine;
  let bar = document.getElementById('offline-bar');
  if (!online) {
    if (!bar) {
      bar = document.createElement('div');
      bar.id = 'offline-bar';
      bar.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#ff453a;color:#fff;text-align:center;font-size:13px;font-weight:700;padding:8px;safe-area-inset-top:8px';
      bar.textContent = '📴 אין חיבור לאינטרנט — מוצגים נתונים שמורים';
      document.body.prepend(bar);
    }
  } else {
    if (bar) bar.remove();
  }
}
window.addEventListener('online',  updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();
